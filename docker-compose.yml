services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Prisma Studio ─────────────────────────────────────
  prisma-studio:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    command: sh -c "npx prisma generate && npx prisma studio --port 5555 --browser none"
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  # ─── API (NestJS) ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT}
      SESSION_SECRET: ${SESSION_SECRET}
      UI_URL: ${UI_URL}
      REPORTING_URL: ${REPORTING_URL}
      MONITORING_URL: ${MONITORING_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS}
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  # ─── UI (Respondent) ───────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${API_URL}
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules

  # ─── Reporting (Tenant Admin) ──────────────────────────
  reporting:
    build:
      context: .
      dockerfile: reporting/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: ${API_URL}
    volumes:
      - ./reporting:/app
      - reporting_node_modules:/app/node_modules

  # ─── Monitoring (Platform Admin) ───────────────────────
  monitoring:
    build:
      context: .
      dockerfile: monitoring/Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      VITE_API_URL: ${API_URL}
    volumes:
      - ./monitoring:/app
      - monitoring_node_modules:/app/node_modules

  # ─── Mailpit (local email testing) ─────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP

volumes:
  pgdata:
  api_node_modules:
  ui_node_modules:
  reporting_node_modules:
  monitoring_node_modules:
